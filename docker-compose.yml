version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env
    depends_on:
      - redis

volumes:
  redis_data:
